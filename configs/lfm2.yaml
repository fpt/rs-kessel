# Local LiquidAI LFM2.5-8B-A1B (in-process llama.cpp).
# The `hf:` modelPath is auto-downloaded into the HuggingFace cache
# (~/.cache/huggingface/hub) on first use — transactional + resumable.
# Format: hf:ORG/REPO[@REVISION]/path/to/file.gguf
llm:
  modelPath: "hf:LiquidAI/LFM2.5-8B-A1B-GGUF/LFM2.5-8B-A1B-Q4_K_M.gguf"
  # Local backend: "llamacpp" (default) or "gallium" (native candle). The native
  # engine supports LFM2.5's hybrid short-conv + GQA MoE architecture. gallium
  # needs a tokenizer.json, which this GGUF repo omits, so also set
  #   KESSEL_GALLIUM_TOKENIZER_REPO=LiquidAI/LFM2.5-8B-A1B
  # inferenceEngine: "gallium"
  harmonyTemplate: false
  temperature: 0.3
  # LFM2.5 is a reasoning model: it emits a <think> block before the answer, so
  # the budget must cover BOTH. 512 was too low — long deliberation got truncated
  # mid-think, leaving no answer to print/speak.
  maxTokens: 2048

agent:
  language: "en"
  maxTurns: 50
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: false                         # Enable text-to-speech
  voice: null                           # Voice identifier (null for default en-US voice)
  rate: 0.5                             # Speech rate (0.0-1.0, default 0.5)
  pitchMultiplier: 1.0                  # Pitch multiplier (0.5-2.0, default 1.0)
  volume: 1.0                           # Volume (0.0-1.0, default 1.0)

stt:
  enabled: false                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements
