llm:
  # `hf:` spec — resolved and downloaded into the HuggingFace cache by the Rust
  # model downloader, so this works from every frontend (Swift, Windows C#, and
  # the Rust CLI).
  #
  # The GGUF build lives in the `-it-GGUF` repo: the plain `unsloth/gemma-4-E4B`
  # repo ships safetensors only, which llama.cpp cannot load.
  modelPath: "hf:unsloth/gemma-4-E4B-it-GGUF/gemma-4-E4B-it-Q4_K_M.gguf"
  baseURL: ""
  model: "gemma4:e4b"
  harmonyTemplate: false
  temperature: 0.7
  maxTokens: 2048

agent:
  # Gemma's chat template rejects a system role; llm_local.rs folds the system
  # prompt into the first user message (see the system-role fold fallback).
  systemPromptPath: null
  maxTurns: 50
  language: "en"
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: true
  voice: "com.apple.voice.enhanced.en-US.Zoe"  # com.apple.voice.enhanced.ja-JP.Kyoko for Japanese
  rate: 0.5
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements

watcher:
  enabled: true                              # Watch Claude Code activity
  debounceInterval: 5.0                      # Seconds to batch events before summarizing
  socketPath: null                         # Unix socket path (null = /tmp/kessel-cli-<uid>.sock)
  sessionPath: null                        # Session JSONL path (null = auto-detect)
