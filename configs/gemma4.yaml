llm:
  # `hf:` spec — resolved and downloaded into the HuggingFace cache by the Rust
  # model downloader, so this works from every frontend (Swift, Windows C#, and
  # the Rust CLI).
  #
  # 26B-A4B: a mixture-of-experts model — 26B total weights, ~4B active per token.
  # This is the QAT (quantization-aware trained) release, which ships exactly one
  # model GGUF, UD-Q4_K_XL; there is no Q4_K_M to pick.
  #
  # 14.3GB on disk, vs 5.0GB for the E4B this replaces. If that does not fit,
  # `hf:unsloth/gemma-4-E4B-it-GGUF/gemma-4-E4B-it-Q4_K_M.gguf` is the smaller
  # sibling and speaks the identical prompt format (docs/GEMMA4.md).
  modelPath: "hf:unsloth/gemma-4-26B-A4B-it-qat-GGUF/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf"
  # Local backend: "llamacpp" (default) or "gallium" (native candle; supports
  # this MoE variant). gallium needs a tokenizer.json, which this GGUF repo
  # omits, so also set KESSEL_GALLIUM_TOKENIZER_REPO=unsloth/gemma-4-26B-A4B-it.
  # NOTE llama.cpp+Metal: 14.3GB exceeds some GPUs' working set (decode error
  # -3) — cap offload with KESSEL_GPU_LAYERS (0 = CPU).
  # inferenceEngine: "gallium"
  baseURL: ""
  model: "gemma4:26b-a4b"
  harmonyTemplate: false
  temperature: 0.7
  maxTokens: 4096

agent:
  # Gemma 4 does support a system role, and its template declares tools natively
  # (`<|tool>` / `<|tool_call>`), which llm_local.rs renders and parses. See
  # docs/GEMMA4.md.
  systemPromptPath: null
  maxTurns: 50
  language: "en"
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: true
  voice: "com.apple.voice.enhanced.en-US.Zoe"  # com.apple.voice.enhanced.ja-JP.Kyoko for Japanese
  rate: 0.5
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements

mcpServers:
  - command: "godevmcp"
    args: ["serve"]

watcher:
  enabled: true                              # Watch Claude Code activity
  debounceInterval: 5.0                      # Seconds to batch events before summarizing
  socketPath: null                         # Unix socket path (null = /tmp/kessel-cli-<uid>.sock)
  sessionPath: null                        # Session JSONL path (null = auto-detect)
