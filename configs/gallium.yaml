# Gallium / local backend (default)
#
# kessel is an ACP client: it spawns a backend agent and drives it a turn at a
# time. This is the default backend — `gallium`, the standalone pure-Rust agent
# (from ../rs-gallium) with the native candle + llama.cpp local engines. It must
# be on PATH (override the program with `KESSEL_ACP_BACKEND`). The `llm:` fields
# below are forwarded to it as environment; the backend runs the ReAct loop,
# tools, and MCP.
#
#   kessel --config configs/gallium.yaml        # gallium on PATH runs the model

llm:
  modelPath: "hf:unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"  # forwarded as MODEL_PATH
  baseURL: ""
  model: "qwen3.5:9b"                 # forwarded as LLM_MODEL
  harmonyTemplate: false
  temperature: 0.7
  maxTokens: 4096

  # The backend's local inference engine: "llamacpp" (in-process llama.cpp) or
  # "gallium" (native pure-Rust candle). Forwarded to the backend as
  # INFERENCE_ENGINE. gallium auto-detects the architecture (gpt-oss / qwen35 /
  # gemma4) from the GGUF metadata (or config.json for safetensors). Optional env
  # knobs (read by the backend):
  #   KESSEL_GALLIUM_TOKENIZER_REPO  tokenizer.json repo (if not beside the GGUF)
  #   KESSEL_GALLIUM_DTYPE           f16 | bf16 | f32  (safetensors only, default f16)
  #   KESSEL_GALLIUM_THINKING        1 to enable Gemma 4's thinking channel
  inferenceEngine: "gallium"

agent:
  systemPromptPath: null
  maxTurns: 50
  language: "en"
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: true
  voice: "com.apple.voice.enhanced.en-US.Zoe"  # com.apple.voice.enhanced.ja-JP.Kyoko for Japanese
  rate: 0.5
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements
