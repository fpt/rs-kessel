llm:
  # Native pure-Rust (candle) inference via the gallium engine — an alternative
  # to the default llama.cpp (FFI) local provider. Selected by a `gallium:` spec:
  #
  #   gallium:<arch>:<format>:<source>
  #
  #   <arch>   = gpt-oss | qwen35 | gemma4   (hand-written model implementations)
  #   <format> = gguf | safetensors
  #   <source> = hf:ORG/REPO/path/to/file.gguf  (gguf), or
  #              hf:ORG/REPO                     (safetensors repo of shards), or
  #              a local .gguf file / model directory
  #
  # Requires the `gallium` cargo feature: build the Rust CLI with
  #   cargo build --release -p kessel-cli --features gallium
  modelPath: "gallium:qwen35:gguf:hf:unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"
  baseURL: ""
  model: "qwen3.5:9b"
  harmonyTemplate: false
  temperature: 0.7
  maxTokens: 2048
  # Optional env knobs (set in the environment, not here):
  #   KESSEL_GALLIUM_TOKENIZER_REPO  tokenizer.json source repo (default: model repo)
  #   KESSEL_GALLIUM_DTYPE           f16 | bf16 | f32  (safetensors only, default f16)
  #   KESSEL_GALLIUM_THINKING        1 to enable Gemma 4's thinking channel

agent:
  systemPromptPath: null
  maxTurns: 50
  language: "en"
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: true
  voice: "com.apple.voice.enhanced.en-US.Zoe"  # com.apple.voice.enhanced.ja-JP.Kyoko for Japanese
  rate: 0.5
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements

watcher:
  enabled: true                              # Watch Claude Code activity
  debounceInterval: 5.0                      # Seconds to batch events before summarizing
  socketPath: null                         # Unix socket path (null = /tmp/kessel-cli-<uid>.sock)
  sessionPath: null                        # Session JSONL path (null = auto-detect)
