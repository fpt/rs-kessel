llm:
  modelPath: "../models/Qwen3.5-9B-Q4_K_M.gguf"
  modelRepo: "unsloth/Qwen3.5-9B-GGUF"
  modelFile: "Qwen3.5-9B-Q4_K_M.gguf"
  baseURL: ""
  model: "qwen3.5:9b"
  harmonyTemplate: false
  temperature: 0.7
  maxTokens: 2048

agent:
  systemPromptPath: null
  maxTurns: 50
  language: "en"
  skillPaths: ["../skills"]   # SKILL.md dirs (relative to this config's dir)

tts:
  enabled: true
  voice: "com.apple.voice.enhanced.en-US.Zoe"  # com.apple.voice.enhanced.ja-JP.Kyoko for Japanese
  rate: 0.5
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true                              # Enable speech-to-text (Apple SpeechTranscriber)
  locale: "en-US"                            # BCP47 locale for transcription
  censor: false                              # Enable etiquette replacements

watcher:
  enabled: true                              # Watch Claude Code activity
  debounceInterval: 5.0                      # Seconds to batch events before summarizing
  socketPath: null                         # Unix socket path (null = /tmp/kessel-cli-<uid>.sock)
  sessionPath: null                        # Session JSONL path (null = auto-detect)
